name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release
        run: |
          mkdir pensieve
          cp main.js manifest.json styles.css pensieve/
          zip -r pensieve.zip pensieve/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pensieve.zip
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
